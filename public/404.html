<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: encode the path into a query param and
      // redirect to the root so React Router can handle it.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/portfolio/?p=" +
          encodeURIComponent(
            l.pathname.slice(1) + (l.search ? "&" + l.search.slice(1) : "") + l.hash
          )
      );
    </script>
  </head>
  <body></body>
</html>
